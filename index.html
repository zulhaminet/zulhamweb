<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feby Zulham Adami | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0a66c2;
            --secondary: #1d3b53;
            --accent: #00d2ff;
            --text: #2d3436;
            --bg: #f0f2f5;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            color: var(--text);
        }

        .container {
            max-width: 900px;
            margin: 20px auto;
            padding: 60px 40px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background: var(--primary);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 3rem;
            box-shadow: 0 10px 20px rgba(10, 102, 194, 0.2);
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3rem;
            margin: 0;
            color: var(--secondary);
            letter-spacing: -1px;
        }

        h2 {
            font-weight: 300;
            color: #636e72;
            margin-bottom: 30px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .divider {
            width: 50px;
            height: 4px;
            background: var(--primary);
            margin: 20px auto 40px;
            border-radius: 2px;
        }

        .nav {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .nav a {
            text-decoration: none;
            padding: 15px 30px;
            border-radius: 15px;
            background: white;
            color: var(--secondary);
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            width: 140px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 1px solid #eee;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .nav a i {
            font-size: 1.8rem;
            color: var(--primary);
        }

        .nav a:hover {
            transform: translateY(-10px);
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 15px 30px rgba(10, 102, 194, 0.3);
        }

        .nav a:hover i {
            color: white;
        }

        footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #7f8c8d;
        }

        @media (max-width: 600px) {
            .container { margin: 15px; padding: 40px 20px; }
            h1 { font-size: 2rem; }
            .nav a { width: 100%; flex-direction: row; justify-content: center; gap: 15px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">
            <i class="fas fa-user-tie"></i>
        </div>

        <h1>Feby Zulham Adami</h1>
        <h2>IT Professional & Cloud Enthusiast</h2>
        
        <div class="divider"></div>

        <div class="nav">
            <a href="./Certificate.html">
                <i class="fas fa-award"></i>
                <span>Certificates</span>
            </a>
            
            <a href="./public/about.html">
                <i class="fas fa-id-card"></i>
                <span>About / CV</span>
            </a>

            <a href="https://www.linkedin.com/in/feby-zulham-adami-934a50153/" target="_blank">
                <i class="fab fa-linkedin"></i>
                <span>LinkedIn</span>
            </a>
        </div>

        <footer>
            <p>© 2026 Feby Zulham Adami.</p>
        </footer>
    </div>

</body>
</html>
